<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Sukses | Senada</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/order.css">
    <style>
        .success-container {
            min-height: calc(100vh - var(--navbar-height));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            margin-top: var(--navbar-height);
        }

        .success-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 48px 32px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(37, 211, 102, 0.1);
            color: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes scaleIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success-card h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--text-primary);
            margin: 0;
        }

        .success-card p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0;
        }

        .order-details-box {
            width: 100%;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: left;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .order-id-badge {
            background: var(--border-color);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-family: monospace;
            font-size: 0.9rem;
        }

        .success-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .whatsapp-followup-btn {
            background-color: #25D366 !important;
            color: #fff !important;
            border: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .whatsapp-followup-btn:hover {
            background-color: #20BA5A !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">Senada</a>
        </div>
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="index.html#why-senada">Why Senada</a>
            <a href="index.html#gallery">Inspiration</a>
        </div>
        <div class="nav-right">
            <a href="builder.html" class="btn btn-outline" style="text-decoration: none;">Ke Builder</a>
        </div>
    </nav>

    <!-- Success Section -->
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            
            <h1 id="success-title">Pesanan Dikirim!</h1>
            <p id="success-subtitle">Terima kasih. Kami telah menerima rincian pesanan dan bukti transfer Anda. Kami akan segera memverifikasi pembayaran Anda.</p>

            <div class="order-details-box">
                <div class="detail-row">
                    <span class="detail-label">Order ID</span>
                    <span class="detail-value order-id-badge" id="order-id-value">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status Pesanan</span>
                    <span class="detail-value" id="order-status-value" style="color: #ff9f43;">Menunggu Verifikasi</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Waktu</span>
                    <span class="detail-value" id="order-time-value">-</span>
                </div>
            </div>

            <div class="success-actions">
                <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-followup-btn" style="text-decoration: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.5-5.781-1.455L0 24zm6.59-4.846c1.62.963 3.4 1.47 5.236 1.47 5.466 0 9.911-4.45 9.916-9.917.002-2.648-1.03-5.138-2.905-7.017-1.876-1.879-4.368-2.913-7.019-2.914-5.474 0-9.919 4.45-9.924 9.919-.001 1.878.49 3.71 1.42 5.335L1.87 21.077l4.777-1.263z"/>
                    </svg>
                    Hubungi via WhatsApp
                </a>
                <a href="builder.html" class="btn btn-primary btn-full" style="text-decoration: none; padding: 14px 0;">Buat Gelang Lagi</a>
            </div>
        </div>
    </div>

    <!-- Theme & Background Scripts -->
    <script>
        // Set Theme matching localStorage
        const savedTheme = localStorage.getItem('senada-theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id') || 'Unknown ID';

        document.getElementById('order-id-value').textContent = orderId;

        // Format Date Time
        const now = new Date();
        const formattedDate = now.toLocaleDateString('id-ID', {
            day: 'numeric',
            month: 'long',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        document.getElementById('order-time-value').textContent = formattedDate;

        // Form Pre-filled WhatsApp Text
        const waNumber = '6281234567890'; // Silakan ganti dengan nomor WA merchant Anda
        const waText = `Halo Senada, saya baru saja melakukan pemesanan custom bracelet dengan Order ID: ${orderId} dan mengunggah bukti transfer. Mohon bantuannya untuk memverifikasi pesanan saya!`;
        
        document.getElementById('whatsapp-link').href = `https://wa.me/${waNumber}?text=${encodeURIComponent(waText)}`;
    </script>
</body>

</html>
